# compose for an app container connectiong to postgres database container
services:
    web:
        build:
            context: ./services/web
            dockerfile: Containerfile
            tags: 
                - angelo53/amptours:latest
        image: ghcr.io/amp53notpam/amptours
        container_name: amptours
        command: >-
                  gunicorn --worker-class gthread --workers 2
                  --bind 0.0.0.0:10000 wsgi:app
                  --access-logfile /home/flasker/web/logs/gunicorn-access.log
                  --error-logfile /home/flasker/web/logs/gunicorn-error.log
                  --timeout 60
        ports:
            - 5000:10000
        extra_hosts:
            - "host.container.internal:host-gateway"
        volumes:
            - vol:/home/flasker/web/uploaded
        networks:
            - ntw
        env_file:
            - ./.env
            - ./.env.flask+postgres
        environment:
            - FLASK_ENV=production
        depends_on:
            - db
  
    db:
        image: docker.io/library/postgres:18-alpine
        volumes:
            - postgres_data:/var/lib/postgresql
        container_name: postgres_db
        env_file:
            - ./.env.flask+postgres
volumes:
    vol:
        name: all_tours
    postgres_data:
        name: all_tours_db

networks:
    ntw:
        name: all_tours
